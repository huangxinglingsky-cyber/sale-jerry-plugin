    <text x="912" y="238" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">测试 → 打包 → 部署</text>
    <text x="912" y="265" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">本地测试 → zip 打包 → 上传发布</text>
  </g>

  
  <g filter="url(#cardShadow)">
    <path fill="#FFFFFF" d="M72,315 H1208 A12,12 0 0 1 1220,327 V503 A12,12 0 0 1 1208,515 H72 A12,12 0 0 1 60,503 V327 A12,12 0 0 1 72,315 Z" />
