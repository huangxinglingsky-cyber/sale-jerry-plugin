    <text x="965" y="405" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">测试部署</text>

    <text x="85" y="465" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">
      <tspan fill="#2563EB" font-weight="bold">蓝色 = 必须</tspan>
      <tspan dx="20" fill="#F97316" font-weight="bold">橙色 = 可选但推荐</tspan>
