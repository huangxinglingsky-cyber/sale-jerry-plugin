    <text font-family="Consolas, Menlo, monospace" fill="#7DD3FC" font-size="15" x="85" y="175">plugin-name/</text><text font-family="Consolas, Menlo, monospace" fill="#E2E8F0" font-size="15" x="85" y="205"><tspan fill="#94A3B8">├── </tspan><tspan fill="#FBBF24">.claude-plugin/</tspan>
