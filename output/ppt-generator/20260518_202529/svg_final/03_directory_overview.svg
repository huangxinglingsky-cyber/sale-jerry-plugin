      </text><text font-family="Consolas, Menlo, monospace" fill="#E2E8F0" font-size="15" x="85" y="263"><tspan fill="#94A3B8">├── </tspan><tspan fill="#93C5FD">.mcp.json</tspan><tspan fill="#64748B">            ← 可选</tspan>
