<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1280" height="5" fill="url(#topBar)"/>

  <text x="60" y="60" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">commands/ — 斜杠命令目录</text>
  <rect x="60" y="73" width="60" height="3" rx="1.5" fill="#2563EB"/>

  <!-- 名词解释 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="100" width="1160" height="80" rx="12" fill="#FFFFFF"/>
    <rect x="60" y="100" width="6" height="80" rx="3" fill="#F97316"/>
    <text x="90" y="135" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">名词解释</text>
    <text x="90" y="162" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Command = 用户侧的快捷方式</text>
    <text x="400" y="162" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">输入 /xxx 即可触发对应流程，是用户与 Plugin 交互的快捷入口</text>
  </g>

  <!-- 左侧：Command 定位 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="210" width="560" height="280" rx="12" fill="#FFFFFF"/>
    <rect x="60" y="210" width="560" height="4" rx="2" fill="#2563EB"/>
    <text x="85" y="248" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">定位</text>
    <text x="85" y="278" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">
      <tspan x="85" dy="0">定义用户可通过 /command 触发的快捷命令</tspan>
      <tspan x="85" dy="24">每个命令一个 .md 文件</tspan>
    </text>

    <text x="85" y="340" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">触发示例</text>
    <rect x="85" y="355" width="500" height="35" rx="6" fill="#1E293B"/>
    <text x="95" y="378" fill="#A5F3FC" font-family="Consolas, Menlo, monospace" font-size="14">/daily-report</text>
    <text x="270" y="378" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">→ 触发日报生成 Skill</text>

    <rect x="85" y="400" width="500" height="35" rx="6" fill="#1E293B"/>
    <text x="95" y="423" fill="#A5F3FC" font-family="Consolas, Menlo, monospace" font-size="14">/plugin-deploy</text>
    <text x="270" y="423" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">→ 触发插件部署 Skill</text>

    <rect x="85" y="445" width="500" height="35" rx="6" fill="#1E293B"/>
    <text x="95" y="468" fill="#A5F3FC" font-family="Consolas, Menlo, monospace" font-size="14">/company-research</text>
    <text x="290" y="468" fill="#64748B" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">→ 触发企业调研 Skill</text>
  </g>

  <!-- 右侧：Command vs Skill 对比 -->
  <g filter="url(#cardShadow)">
    <rect x="660" y="210" width="560" height="280" rx="12" fill="#FFFFFF"/>
    <rect x="660" y="210" width="560" height="4" rx="2" fill="#2563EB"/>
    <text x="685" y="248" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Command vs Skill 对比</text>

    <!-- 表头 -->
    <rect x="685" y="270" width="240" height="32" rx="6" fill="#2563EB" fill-opacity="0.08"/>
    <rect x="935" y="270" width="260" height="32" rx="6" fill="#2563EB" fill-opacity="0.08"/>
    <text x="805" y="291" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">Command</text>
    <text x="1065" y="291" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">Skill</text>

    <!-- 触发方式 -->
    <text x="685" y="330" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">用户主动输入 /xxx</text>
    <text x="935" y="330" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">Agent 调度或用户调用</text>

    <!-- 角色 -->
    <text x="685" y="365" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">快捷入口（前台）</text>
    <text x="935" y="365" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">能力单元（后台）</text>

    <!-- 关系 -->
    <text x="685" y="400" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">指向并触发 Skill</text>
    <text x="935" y="400" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">实际执行逻辑</text>

    <!-- 数量 -->
    <text x="685" y="435" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">可选，非必须</text>
    <text x="935" y="435" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">Plugin 核心能力</text>

    <line x1="925" y1="310" x2="925" y2="450" stroke="#E2E8F0" stroke-width="1"/>
  </g>

  <!-- 底部 -->
  <rect x="60" y="520" width="1160" height="50" rx="8" fill="#2563EB" fill-opacity="0.06"/>
  <text x="640" y="550" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">
    Skill 可以独立存在（不依赖 Command），但 Command 必须指向一个 Skill 或流程
  </text>

  <text x="1180" y="700" text-anchor="end" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">08 / 10</text>
</svg>