<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1280" height="5" fill="url(#topBar)"/>

  <text x="60" y="60" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">skills/ — Skill 定义目录</text>
  <rect x="60" y="73" width="60" height="3" rx="1.5" fill="#2563EB"/>

  <!-- 名词解释 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="100" width="1160" height="70" rx="12" fill="#FFFFFF"/>
    <rect x="60" y="100" width="6" height="70" rx="3" fill="#F97316"/>
    <text x="90" y="133" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">名词解释</text>
    <text x="90" y="157" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="17" font-weight="bold">Skill = 单一职责的可执行指令集</text>
    <text x="400" y="157" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">类似一个"工具"或"能力卡片"，每个 Skill 做好一件事</text>
  </g>

  <!-- 左侧：目录结构 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="195" width="370" height="300" rx="12" fill="#1E293B"/>
    <rect x="60" y="195" width="370" height="36" rx="12" fill="#0F172A"/>
    <rect x="60" y="219" width="370" height="12" fill="#0F172A"/>
    <circle cx="82" cy="213" r="5" fill="#EF4444" opacity="0.7"/>
    <circle cx="98" cy="213" r="5" fill="#F59E0B" opacity="0.7"/>
    <circle cx="114" cy="213" r="5" fill="#22C55E" opacity="0.7"/>

    <text font-family="Consolas, Menlo, monospace" font-size="13" y="252" x="80" fill="#E2E8F0">
      <tspan x="80" fill="#7DD3FC">skills/</tspan>
      <tspan x="80" dy="22" fill="#94A3B8">├── </tspan><tspan fill="#93C5FD">company-research/</tspan>
      <tspan x="100" dy="20" fill="#94A3B8">└── </tspan><tspan fill="#A5F3FC">SKILL.md</tspan>
      <tspan x="80" dy="22" fill="#94A3B8">├── </tspan><tspan fill="#93C5FD">daily-report/</tspan>
      <tspan x="100" dy="20" fill="#94A3B8">└── </tspan><tspan fill="#A5F3FC">SKILL.md</tspan>
      <tspan x="80" dy="22" fill="#94A3B8">├── </tspan><tspan fill="#93C5FD">dingtalk-ai-table/</tspan>
      <tspan x="100" dy="20" fill="#94A3B8">├── </tspan><tspan fill="#A5F3FC">SKILL.md</tspan>
      <tspan x="100" dy="20" fill="#94A3B8">├── </tspan><tspan fill="#64748B">references/</tspan>
      <tspan x="100" dy="20" fill="#94A3B8">└── </tspan><tspan fill="#64748B">scripts/</tspan>
      <tspan x="80" dy="22" fill="#94A3B8">└── </tspan><tspan fill="#93C5FD">sales-script/</tspan>
      <tspan x="100" dy="20" fill="#94A3B8">├── </tspan><tspan fill="#A5F3FC">SKILL.md</tspan>
      <tspan x="100" dy="20" fill="#94A3B8">├── </tspan><tspan fill="#64748B">config/</tspan>
      <tspan x="100" dy="20" fill="#94A3B8">└── </tspan><tspan fill="#64748B">resource/</tspan>
    </text>
  </g>

  <!-- 中间：SKILL.md 核心要素 -->
  <g filter="url(#cardShadow)">
    <rect x="455" y="195" width="370" height="300" rx="12" fill="#FFFFFF"/>
    <rect x="455" y="195" width="370" height="4" rx="2" fill="#2563EB"/>
    <text x="480" y="230" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">SKILL.md 核心要素</text>

    <text x="480" y="262" fill="#2563EB" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="bold">Purpose</text>
    <text x="480" y="282" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">功能目的，2-3 句话说明</text>

    <text x="480" y="312" fill="#2563EB" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="bold">Parameters</text>
    <text x="480" y="332" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">参数定义表（名称、类型、默认值）</text>

    <text x="480" y="362" fill="#2563EB" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="bold">Instructions</text>
    <text x="480" y="382" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">详细执行步骤，必须可执行、无歧义</text>

    <text x="480" y="412" fill="#2563EB" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="bold">Examples</text>
    <text x="480" y="432" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">1-2 个完整使用示例</text>

    <text x="480" y="462" fill="#2563EB" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="bold">Version</text>
    <text x="480" y="482" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">版本号与变更记录</text>
  </g>

  <!-- 右侧：辅助资源 -->
  <g filter="url(#cardShadow)">
    <rect x="850" y="195" width="370" height="300" rx="12" fill="#FFFFFF"/>
    <rect x="850" y="195" width="370" height="4" rx="2" fill="#2563EB"/>
    <text x="875" y="230" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">辅助资源子目录</text>

    <rect x="875" y="252" width="130" height="28" rx="14" fill="#2563EB" fill-opacity="0.08"/>
    <text x="940" y="271" text-anchor="middle" fill="#2563EB" font-family="Consolas, Menlo, monospace" font-size="13">references/</text>
    <text x="875" y="295" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">API 参考文档、错误码表</text>

    <rect x="875" y="318" width="110" height="28" rx="14" fill="#2563EB" fill-opacity="0.08"/>
    <text x="930" y="337" text-anchor="middle" fill="#2563EB" font-family="Consolas, Menlo, monospace" font-size="13">scripts/</text>
    <text x="875" y="361" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">辅助脚本（数据处理等）</text>

    <rect x="875" y="384" width="100" height="28" rx="14" fill="#2563EB" fill-opacity="0.08"/>
    <text x="925" y="403" text-anchor="middle" fill="#2563EB" font-family="Consolas, Menlo, monospace" font-size="13">config/</text>
    <text x="875" y="427" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">配置文件、映射表</text>

    <rect x="875" y="450" width="110" height="28" rx="14" fill="#2563EB" fill-opacity="0.08"/>
    <text x="930" y="469" text-anchor="middle" fill="#2563EB" font-family="Consolas, Menlo, monospace" font-size="13">resource/</text>
    <text x="875" y="483" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">模板、示例等静态资源</text>
  </g>

  <!-- 底部 -->
  <rect x="60" y="520" width="1160" height="55" rx="8" fill="#2563EB" fill-opacity="0.06"/>
  <text x="100" y="548" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">关键规则:</text>
  <text x="230" y="548" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">每个 Skill 必须有独立的子目录，子目录中 SKILL.md 是唯一必须文件</text>

  <text x="1180" y="700" text-anchor="end" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">06 / 10</text>
</svg>