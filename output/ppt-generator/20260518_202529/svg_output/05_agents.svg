<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1280" height="5" fill="url(#topBar)"/>

  <text x="60" y="60" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">agents/ — Agent 定义目录</text>
  <rect x="60" y="73" width="60" height="3" rx="1.5" fill="#2563EB"/>

  <!-- 名词解释卡片 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="100" width="1160" height="90" rx="12" fill="#FFFFFF"/>
    <rect x="60" y="100" width="6" height="90" rx="3" fill="#F97316"/>
    <text x="90" y="135" fill="#F97316" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">名词解释</text>
    <text x="90" y="165" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Agent = 有角色的智能调度器</text>
    <text x="380" y="165" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">能理解用户意图，编排多个 Skill 完成复杂任务</text>
  </g>

  <!-- 左侧：定位与文件 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="215" width="370" height="280" rx="12" fill="#FFFFFF"/>
    <rect x="60" y="215" width="370" height="4" rx="2" fill="#2563EB"/>
    <text x="85" y="250" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">定位</text>
    <text x="85" y="280" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">
      <tspan x="85" dy="0">定义具有独立角色和判断能力</tspan>
      <tspan x="85" dy="22">的 AI 代理</tspan>
    </text>

    <text x="85" y="330" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">放置文件</text>
    <text x="85" y="358" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">每个 Agent 一个 .md 文件</text>
    <rect x="85" y="375" width="300" height="32" rx="6" fill="#1E293B"/>
    <text x="95" y="396" fill="#A5F3FC" font-family="Consolas, Menlo, monospace" font-size="13">agents/sales-master.md</text>

    <text x="85" y="435" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">运转方式</text>
    <text x="85" y="462" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">自动匹配用户意图，调度 Skills</text>
  </g>

  <!-- 中间：核心要素 -->
  <g filter="url(#cardShadow)">
    <rect x="455" y="215" width="370" height="280" rx="12" fill="#FFFFFF"/>
    <rect x="455" y="215" width="370" height="4" rx="2" fill="#2563EB"/>
    <text x="480" y="250" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Agent 核心要素</text>

    <rect x="480" y="268" width="120" height="28" rx="14" fill="#2563EB" fill-opacity="0.1"/>
    <text x="540" y="287" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">Identity 身份</text>
    <text x="480" y="312" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">角色定位、公司信息、专业背景</text>

    <rect x="480" y="330" width="120" height="28" rx="14" fill="#2563EB" fill-opacity="0.1"/>
    <text x="540" y="349" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">Capabilities</text>
    <text x="480" y="374" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">核心能力列表（阶段识别、调度等）</text>

    <rect x="480" y="392" width="120" height="28" rx="14" fill="#2563EB" fill-opacity="0.1"/>
    <text x="540" y="411" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">Workflow</text>
    <text x="480" y="436" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">工作流程编排（A 阶段 → B 阶段）</text>

    <rect x="480" y="454" width="120" height="28" rx="14" fill="#2563EB" fill-opacity="0.1"/>
    <text x="540" y="473" text-anchor="middle" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">Instructions</text>
  </g>

  <!-- 右侧：示例 -->
  <g filter="url(#cardShadow)">
    <rect x="850" y="215" width="370" height="280" rx="12" fill="#1E293B"/>
    <rect x="850" y="215" width="370" height="36" rx="12" fill="#0F172A"/>
    <rect x="850" y="239" width="370" height="12" fill="#0F172A"/>
    <circle cx="872" cy="233" r="5" fill="#EF4444" opacity="0.7"/>
    <circle cx="888" cy="233" r="5" fill="#F59E0B" opacity="0.7"/>
    <circle cx="904" cy="233" r="5" fill="#22C55E" opacity="0.7"/>
    <text x="925" y="237" fill="#64748B" font-family="Consolas, Menlo, monospace" font-size="12">sales-master.md</text>

    <text font-family="Consolas, Menlo, monospace" font-size="13" y="275" x="870" fill="#E2E8F0">
      <tspan x="870" fill="#7DD3FC">---</tspan>
      <tspan x="870" dy="20" fill="#7DD3FC">name: sales-master</tspan>
      <tspan x="870" dy="20" fill="#7DD3FC">description: 销售主控代理</tspan>
      <tspan x="870" dy="20" fill="#7DD3FC">---</tspan>
      <tspan x="870" dy="28" fill="#64748B"># sales-master</tspan>
      <tspan x="870" dy="24" fill="#94A3B8">  </tspan>
      <tspan x="870" dy="24" fill="#E2E8F0">## 身份 (Identity)</tspan>
      <tspan x="870" dy="20" fill="#E2E8F0">  你是专业的销售流程</tspan>
      <tspan x="870" dy="20" fill="#E2E8F0">  管理专家...</tspan>
      <tspan x="870" dy="28" fill="#E2E8F0">## 能力 (Capabilities)</tspan>
      <tspan x="870" dy="20" fill="#E2E8F0">  1. 销售阶段识别</tspan>
      <tspan x="870" dy="20" fill="#E2E8F0">  2. 智能 Skill 调度</tspan>
      <tspan x="870" dy="20" fill="#E2E8F0">  3. 完整流程管理</tspan>
    </text>
  </g>

  <!-- 底部对比 -->
  <rect x="60" y="525" width="1160" height="55" rx="8" fill="#2563EB" fill-opacity="0.06"/>
  <text x="100" y="558" fill="#2563EB" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="bold">Agent vs Skill:</text>
  <text x="280" y="558" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">Agent 是"大脑"（理解意图、编排流程） → Skill 是"手脚"（执行具体任务）</text>

  <text x="1180" y="700" text-anchor="end" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">05 / 10</text>
</svg>