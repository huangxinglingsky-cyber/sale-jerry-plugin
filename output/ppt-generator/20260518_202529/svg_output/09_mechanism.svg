<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1280" height="5" fill="url(#topBar)"/>

  <text x="60" y="60" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="bold">Plugin 运转机制</text>
  <rect x="60" y="73" width="60" height="3" rx="1.5" fill="#2563EB"/>

  <!-- 加载流程 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="100" width="1160" height="180" rx="12" fill="#FFFFFF"/>
    <text x="85" y="138" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">加载流程</text>

    <!-- 步骤节点 -->
    <rect x="85" y="158" width="180" height="40" rx="20" fill="#1E3A5F"/>
    <text x="175" y="183" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">Claude Code 启动</text>

    <text x="280" y="183" fill="#94A3B8" font-size="20">→</text>

    <rect x="305" y="158" width="180" height="40" rx="20" fill="#2563EB"/>
    <text x="395" y="183" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">读取 plugin.json</text>

    <text x="500" y="183" fill="#94A3B8" font-size="20">→</text>

    <rect x="525" y="158" width="220" height="40" rx="20" fill="#2563EB"/>
    <text x="635" y="183" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">注册 Agents &amp; Skills</text>

    <text x="760" y="183" fill="#94A3B8" font-size="20">→</text>

    <rect x="785" y="158" width="200" height="40" rx="20" fill="#22C55E" fill-opacity="0.9"/>
    <text x="885" y="183" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="bold">等待用户对话</text>

    <text x="85" y="230" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">
      <tspan x="85" dy="0">启动时自动扫描所有已安装 Plugin 的 plugin.json → 注册声明的 Agents 和 Skills → 用户对话时自动匹配合适的能力</tspan>
    </text>
  </g>

  <!-- Agent 调度流 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="305" width="740" height="220" rx="12" fill="#FFFFFF"/>
    <text x="85" y="340" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Agent 调度流</text>

    <!-- 流程图 -->
    <rect x="85" y="360" width="130" height="40" rx="20" fill="#1E3A5F"/>
    <text x="150" y="385" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">用户发消息</text>

    <text x="230" y="385" fill="#94A3B8" font-size="20">→</text>

    <rect x="255" y="360" width="130" height="40" rx="20" fill="#2563EB"/>
    <text x="320" y="385" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">Agent 识别意图</text>

    <text x="400" y="385" fill="#94A3B8" font-size="20">→</text>

    <rect x="425" y="360" width="130" height="40" rx="20" fill="#F97316"/>
    <text x="490" y="385" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">选择 Skill</text>

    <text x="570" y="385" fill="#94A3B8" font-size="20">→</text>

    <rect x="595" y="360" width="160" height="40" rx="20" fill="#22C55E" fill-opacity="0.9"/>
    <text x="675" y="385" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">执行并返回结果</text>

    <!-- 示例 -->
    <text x="85" y="430" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">示例：用户说"帮我调研招商银行" → Agent 识别为"企业调研" → 调用 company-research Skill → 输出调研报告</text>
  </g>

  <!-- Skill 触发方式 -->
  <g filter="url(#cardShadow)">
    <rect x="830" y="305" width="390" height="220" rx="12" fill="#FFFFFF"/>
    <text x="855" y="340" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold">Skill 触发方式</text>

    <rect x="855" y="360" width="30" height="30" rx="15" fill="#2563EB"/>
    <text x="870" y="380" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">1</text>
    <text x="895" y="380" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">Agent 自动调度</text>
    <text x="895" y="400" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">Agent 识别意图后自动选择</text>

    <rect x="855" y="415" width="30" height="30" rx="15" fill="#F97316"/>
    <text x="870" y="435" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">2</text>
    <text x="895" y="435" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">用户 /skill-name 调用</text>
    <text x="895" y="455" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">手动输入斜杠命令触发</text>

    <rect x="855" y="470" width="30" height="30" rx="15" fill="#22C55E"/>
    <text x="870" y="490" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">3</text>
    <text x="895" y="490" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold">其他 Skill 内部调用</text>
    <text x="895" y="510" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">Skill 之间可相互协作</text>
  </g>

  <!-- 底部数据流 -->
  <rect x="60" y="555" width="1160" height="55" rx="8" fill="#1E3A5F" fill-opacity="0.05"/>
  <text x="640" y="588" text-anchor="middle" fill="#1E3A5F" font-family="Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="bold">
    数据流：用户输入 → Agent（理解意图） → Skill（执行任务） → 输出结果
  </text>

  <text x="1180" y="700" text-anchor="end" fill="#94A3B8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">09 / 10</text>
</svg>